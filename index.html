  to{

<script>
/*==================================================
      SUPABASE INITIALISATION & CONFIGURATION
==================================================*/
const supabase = window.supabase.createClient(
  "https://xkhkblqxndnjrenamtch.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhraGtibHF4bmRuanJlbmFtdGNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NzAzMzMsImV4cCI6MjA5OTU0NjMzM30.fAEUimFwKyWFa4OfTmDaxqTGvL1wjVhXoQkBqxX5YLE"
);

function updatePhoneCode(){
  const country = document.getElementById('country').value;
  document.getElementById('phoneCode').innerText = country;
}
updatePhoneCode();

const auth = document.getElementById('auth');
const app = document.getElementById('app');
const home = document.getElementById('home');
const ordersPage = document.getElementById('orders');
const teamPage = document.getElementById('team');
const mePage = document.getElementById('me');

let user = null;

/* ================= PRODUITS PREMIUM ================= */
const products = [
  { id:1, name:"VIP 1", subtitle:"Starter Premium", price:5000, daily:200, total:12000, duration:60, badge:"Populaire", color:"#d4af37", img:"https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?q=80&w=1200&auto=format&fit=crop" },
  { id:2, name:"VIP 2", subtitle:"Gold Business", price:15000, daily:400, total:24000, duration:60, badge:"Rentable", color:"#c9a227", img:"https://images.unsplash.com/photo-1559526324-593bc073d938?q=80&w=1200&auto=format&fit=crop" },
  { id:3, name:"VIP 3", subtitle:"Luxury Investor", price:20000, daily:700, total:42000, duration:60, badge:"VIP", color:"#e5c158", img:"https://images.unsplash.com/photo-1518546305927-5a555bb7020d?q=80&w=1200&auto=format&fit=crop" },
  { id:4, name:"VIP 4", subtitle:"Elite Premium", price:40000, daily:1000, total:60000, duration:60, badge:"Elite", color:"#f5d76e", img:"https://images.unsplash.com/photo-1521791136064-7986c2920216?q=80&w=1200&auto=format&fit=crop" },
  { id:5, name:"VIP 5", subtitle:"Diamond Plan", price:60000, daily:2000, total:120000, duration:60, badge:"Diamond", color:"#ffd700", img:"https://images.unsplash.com/photo-1556740749-887f6717d7e4?q=80&w=1200&auto=format&fit=crop" },
  { id:6, name:"VIP 6", subtitle:"Executive Club", price:100000, daily:10000, total:300000, duration:30, badge:"Executive", color:"#ffcc33", img:"https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1200&auto=format&fit=crop" },
  { id:7, name:"VIP 7", subtitle:"Royal Investor", price:200000, daily:20000, total:600000, duration:30, badge:"Royal", color:"#f0b90b", img:"https://images.unsplash.com/photo-1507679799987-c73779587ccf?q=80&w=1200&auto=format&fit=crop" },
  { id:8, name:"VIP 8", subtitle:"Prestige Max", price:300000, daily:30000, total:900000, duration:30, badge:"Prestige", color:"#f7c948", img:"https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1200&auto=format&fit=crop" },
  { id:9, name:"VIP 9", subtitle:"Imperial Gold", price:400000, daily:40000, total:1200000, duration:30, badge:"Imperial", color:"#ffdf6c", img:"https://images.unsplash.com/photo-1460317442991-0ec209397118?q=80&w=1200&auto=format&fit=crop" },
  { id:10, name:"VIP 10", subtitle:"Ultimate Emirates", price:500000, daily:50000, total:1500000, duration:30, badge:"Ultra VIP", color:"#ffb703", img:"https://images.unsplash.com/photo-1497366754035-f200968a6e72?q=80&w=1200&auto=format&fit=crop" }
];

/* ================= ACTIONS SUPABASE ================= */

async function updateCurrentUserBalance() {
  await supabase.from('users').update({ balance: user.balance }).eq('id', user.id);
}

async function register(){
  const phone = document.getElementById('phone').value.trim();
  const pass = document.getElementById('pass').value.trim();
  const ref = document.getElementById('ref').value.trim();

  if(!phone || !pass){
    alert('Veuillez remplir tous les champs');
    return;
  }

  // Vérification de l'existence du numéro sur Supabase
  let { data: checkUser } = await supabase.from('users').select('id').eq('phone', phone).maybeSingle();
  if(checkUser){
    alert('Compte déjà existant');
    return;
  }

  const newUser = {
    id: Date.now(),
    phone,
    password: pass,
    balance: 500,
    code: 'AI' + Math.random().toString(36).substring(2,8),
    referrer: ref
  };

  const { error } = await supabase.from('users').insert([newUser]);
  if(error) {
    alert("Erreur lors de la création du compte.");
    return;
  }

  alert('Compte créé avec succès. Bonus d\'inscription de 500 FCFA accordé !');
}

async function login(){
  const phone = document.getElementById('phone').value.trim();
  const pass = document.getElementById('pass').value.trim();

  let { data: foundUser, error } = await supabase.from('users').select('*').eq('phone', phone).eq('password', pass).maybeSingle();

  if(!foundUser || error){
    alert('Identifiants incorrects');
    return;
  }

  user = foundUser;

  // Session conservée uniquement en mémoire vive ou gérée via redirection de l'UI
  auth.style.display = 'none';
  app.style.display = 'block';
  document.getElementById('userId').innerText = user.phone;

  await renderAll();
}

function logout(){
  user = null;
  auth.style.display = 'block';
  app.style.display = 'none';
}

async function renderHome(){
  // Récupérer les gains sur Supabase
  let { data: txList } = await supabase.from('transactions').select('amount').eq('user_id', user.id).eq('type', 'gain');
  let gains = (txList || []).reduce((sum, t) => sum + Number(t.amount), 0);

  // Récupérer le nombre de VIP actifs
  let { data: ordList } = await supabase.from('orders').select('id').eq('user_id', user.id);
  let activeVipsCount = ordList ? ordList.length : 0;

  home.innerHTML = `
    <img class="banner" src="https://mir-s3-cdn-cf.behance.net/project_modules/max_1200/5e342a106822209.5f992383e20e8.jpg">
    <div class="balance-box">
      <p>Solde disponible</p>
      <h1>${user.balance.toLocaleString()} FCFA</h1>
      <div class="vip-status">Compte VIP Actif</div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <h3>${gains.toLocaleString()}</h3>
        <p>Revenus</p>
      </div>
      <div class="stat-card">
        <h3>${activeVipsCount}</h3>
        <p>VIP actifs</p>
      </div>
    </div>

    <div class="action-grid">
      <div class="action-btn" onclick="deposit()">💳<br>Dépôt</div>
      <div class="action-btn" onclick="withdraw()">🏧<br>Retrait</div>
      <div class="action-btn" onclick="showPage('orders')">🚀<br>VIP</div>
      <div class="action-btn" onclick="showPage('team')">👥<br>Équipe</div>
    </div>
  `;

  products.forEach((p, index) => {
    home.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <div class="card-content">
          <h3>${p.name}</h3>
          <div class="grid-info">
            <p>Prix : <b>${p.price} FCFA</b></p>
            <p>Jour : <b>${p.daily} FCFA</b></p>
            <p>Total : <b>${p.total} FCFA</b></p>
            <p>Durée : <b>${p.duration} jours</b></p>
          </div>
          <button class="btn-primary" onclick="buy(${index})">Activer l'investissement</button>
        </div>
      </div>
    `;
  });
}

async function buy(index){
  const p = products[index];

  if(user.balance < p.price){
    alert('Solde insuffisant');
    return;
  }

  user.balance -= p.price;
  await updateCurrentUserBalance();

  // Enregistrer la commande
  await supabase.from('orders').insert([{
    id: Date.now(),
    user_id: user.id,
    product: p.name,
    daily: p.daily,
    lastClaim: 0,
    purchaseTime: Date.now(),
    image: p.img
  }]);

  // Enregistrer la transaction
  await supabase.from('transactions').insert([{
    user_id: user.id,
    type: 'achat',
    amount: p.price,
    date: new Date().toLocaleString()
  }]);

  /* --- DISTRIBUTION AUTOMATIQUE DU PARRAINAGE SUR 3 NIVEAUX VIA SUPABASE --- */
  if (user.referrer) {
    let { data: parent1 } = await supabase.from('users').select('*').eq('code', user.referrer).maybeSingle();

      let bonus1 = p.price * 0.27;
      await supabase.from('users').update({ balance: Number(parent1.balance) + bonus1 }).eq('id', parent1.id);
      await supabase.from('transactions').insert([{
        user_id: parent1.id,
        type: `Bonus Parrainage (Niveau 1 - Filleul: ${user.phone})`,
        amount: bonus1,
        date: new Date().toLocaleString()
      }]);

      if (parent1.referrer) {
        let { data: parent2 } = await supabase.from('users').select('*').eq('code', parent1.referrer).maybeSingle();
        if (parent2) {
          let bonus2 = p.price * 0.02;
          await supabase.from('users').update({ balance: Number(parent2.balance) + bonus2 }).eq('id', parent2.id);
          await supabase.from('transactions').insert([{
            user_id: parent2.id,
            type: `Bonus Parrainage (Niveau 2 - Filleul: ${user.phone})`,
            amount: bonus2,
            date: new Date().toLocaleString()
          }]);

          if (parent2.referrer) {
            let { data: parent3 } = await supabase.from('users').select('*').eq('code', parent2.referrer).maybeSingle();
            if (parent3) {
              let bonus3 = p.price * 0.01;
              await supabase.from('users').update({ balance: Number(parent3.balance) + bonus3 }).eq('id', parent3.id);
              await supabase.from('transactions').insert([{
                user_id: parent3.id,
                type: `Bonus Parrainage (Niveau 3 - Filleul: ${user.phone})`,
                amount: bonus3,
                date: new Date().toLocaleString()
              }]);
            }
          }
        }
      }
    }
  }

  await renderAll();
  alert("VIP activé avec succès");
}

async function renderOrders(){
  let { data: myOrders } = await supabase.from('orders').select('*').eq('user_id', user.id);
  myOrders = myOrders || [];

  ordersPage.innerHTML = '<h2>Mes investissements</h2><br>';

  if(myOrders.length === 0){
    ordersPage.innerHTML += '<p>Aucun investissement actif</p>';
    return;
  }

  myOrders.forEach(order => {
    const maintenant = Date.now();
    const tempsEcoule = maintenant - (Number(order.lastClaim) || Number(order.purchaseTime));
    const reste24h = 86400000 - tempsEcoule;

    let formatHeureAchat = new Date(Number(order.purchaseTime)).toLocaleString('fr-FR');
    let boutonTexte = "Réclamer le gain";
    let boutonDisabled = "";

    if (reste24h > 0) {
      const dateDeblocage = new Date(maintenant + reste24h);
      const options = { hour: '2-digit', minute: '2-digit' };
      boutonTexte = `Disponible demain à ${dateDeblocage.toLocaleTimeString('fr-FR', options)}`;
      boutonDisabled = "disabled style='background:#ccc; cursor:not-allowed; transform:none;'";
    }

    ordersPage.innerHTML += `
      <div class="card">
        <img src="${order.image || 'https://via.placeholder.com/150'}" style="width:100%; height:220px; object-fit:cover;">
        <div class="card-content">
          <h3>${order.product}</h3>
          <p style="margin-bottom: 5px; font-size:13px; color:#555;">Acheté le : <b>${formatHeureAchat}</b></p>
          <p style="margin-bottom: 15px;">Gain journalier : <b>${order.daily} FCFA</b></p>
          <button class="btn-primary" ${boutonDisabled} onclick="claim(${order.id})">${boutonTexte}</button>
        </div>
      </div>
    `;
  });
}

async function claim(id){
  let { data: order } = await supabase.from('orders').select('*').eq('id', id).maybeSingle();
  if(!order) return;

  const maintenant = Date.now();
  const tempsEcoule = maintenant - (Number(order.lastClaim) || Number(order.purchaseTime));

  if(tempsEcoule < 86400000){
    alert('Déjà réclamé aujourd’hui. Revenu disponible toutes les 24h.');
    return;
  }

  user.balance += Number(order.daily);
  await updateCurrentUserBalance();

  await supabase.from('orders').update({ lastClaim: maintenant }).eq('id', id);
  await supabase.from('transactions').insert([{
    user_id: user.id,
    type: 'gain',
    amount: order.daily,
    date: new Date().toLocaleString()
  }]);

  await renderAll();
  alert('Gain réclamé');
}

async function showTransactions(){

  myTx = myTx || [];

  let html = `
    <div class="card">
    <div class="card-content">

  `;

  if(myTx.length === 0){
    html += `<p>Aucune transaction</p>`;
  } else {
    myTx.reverse().forEach(t => {
      let color = '#111';
      if(t.type === 'gain') color = 'green';
      if(t.type === 'retrait') color = 'red';
      if(t.type === 'achat') color = '#d4a437';

      html += `
        <div style="padding:15px;border-bottom:1px solid #eee;margin-bottom:10px;">
          <p style="font-weight:700;color:${color};text-transform:capitalize;">${t.type}</p>

          <p style="font-size:12px;color:#666;">${t.date || ''}</p>

      `;
    });
  }

  html += `</div></div>`;
  mePage.innerHTML = html;
}

async function claimBonus(){

    });

let liveIndex = 0;
function showLive(){
  const liveBar = document.getElementById("liveBar");
  if(auth.style.display !== "none" || !document.getElementById("home").classList.contains("active")){
