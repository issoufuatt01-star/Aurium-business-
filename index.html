<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurum Business Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#001f4d,#0a2a5c,#d4a437);
min-height:100vh;
overflow-x:hidden;
}

.auth-container{
width:100%;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.auth-box{
width:100%;
max-width:430px;
background:rgba(15,23,42,0.98);
padding:25px;
border-radius:24px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

.logo-circle{
width:90px;
height:90px;
border-radius:50%;
background:linear-gradient(135deg,#d4a437,#f7d774);
display:flex;
justify-content:center;
align-items:center;
margin:0 auto 20px;
font-size:40px;
}

.title{
text-align:center;
font-size:28px;
color:#f5c542;
font-weight:700;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#cbd5e1;
margin-bottom:25px;
font-size:14px;
}

.input-group{
display:flex;
flex-direction:column;
margin-bottom:15px;
}

.input-group label{
margin-bottom:6px;
color:#cbd5e1;
font-size:13px;
}

.input-group input,
.input-group select{
padding:14px;
border:none;
border-radius:14px;
background:#1e293b;
color:#fff;
font-size:14px;
outline:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
cursor:pointer;
font-weight:700;
margin-top:10px;
}

.btn-primary{
background:linear-gradient(135deg,#d4a437,#f7d774);
color:#000;
}

.btn-secondary{
background:#111827;
color:#fff;
}

#app{
display:none;
width:100%;
max-width:500px;
margin:auto;
min-height:100vh;
background:#f5f7fb;
}

.header{
background:#0f172a;
color:#fff;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:999;
}

.logo{
color:#f5c542;
font-size:22px;
font-weight:700;
}

.page{
display:none;
padding:15px;
padding-bottom:120px;
}

.page.active{
display:block;
}

.balance-box{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:#fff;
padding:20px;
border-radius:18px;
margin-bottom:15px;
}

.balance-box h1{
margin-top:10px;
font-size:30px;
}

.card{
background:#fff;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-content{
padding:18px;
}

.grid-info{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
font-size:14px;
margin-bottom:15px;
}

.nav{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:500px;
background:#fff;
display:grid;
grid-template-columns:repeat(4,1fr);
border-top:1px solid #ddd;
}

.nav button{
background:none;
font-size:22px;
color:#0f172a;
}

.menu-item{
display:flex;
justify-content:space-between;
padding:16px;
border-bottom:1px solid #eee;
cursor:pointer;
background:#fff;
}
</style>
</head>
<body>

<div class="auth-container">
<div class="auth-box" id="auth">

<div class="logo-circle">💎</div>

<h1 class="title">Aurum Business Pro</h1>

<p class="subtitle">
Plateforme digitale sécurisée
</p>

<div class="input-group">
<label>Téléphone</label>
<input type="tel" id="phone" placeholder="70123456">
</div>

<div class="input-group">
<label>Mot de passe</label>
<input type="password" id="pass">
</div>

<div class="input-group">
<label>Code de parrainage</label>
<input type="text" id="ref">
</div>

<button class="btn-primary" onclick="register()">
Créer un compte
</button>

<button class="btn-secondary" onclick="login()">
Connexion
</button>

</div>
</div>

<div id="app">

<div class="header">
<div class="logo">AURUM</div>
<div id="userPhone"></div>
</div>

<div id="home" class="page active"></div>
<div id="orders" class="page"></div>
<div id="team" class="page"></div>
<div id="me" class="page"></div>

<div class="nav">
<button onclick="showPage('home')">🏠</button>
<button onclick="showPage('orders')">🚀</button>
<button onclick="showPage('team')">👥</button>
<button onclick="showPage('me')">⚙️</button>
</div>

</div>

<script>

/* ================= APPWRITE ================= */

const client = new Appwrite.Client();

client
.setEndpoint('https://fra.cloud.appwrite.io/v1')
.setProject('YOUR_PROJECT_ID');

const databases = new Appwrite.Databases(client);

const DATABASE_ID = 'YOUR_DATABASE_ID';
const USERS_COLLECTION = 'YOUR_USERS_COLLECTION';
const ORDERS_COLLECTION = 'YOUR_ORDERS_COLLECTION';
const TRANSACTIONS_COLLECTION = 'YOUR_TRANSACTIONS_COLLECTION';

/* ================= VARIABLES ================= */

const auth = document.getElementById('auth');
const app = document.getElementById('app');

const home = document.getElementById('home');
const ordersPage = document.getElementById('orders');
const teamPage = document.getElementById('team');
const mePage = document.getElementById('me');

let user = null;
let orders = [];
let transactions = [];

/* ================= PRODUITS ================= */

const products = [
{
name:'VIP 1',
price:3000,
daily:750,
duration:60,
img:'https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?q=80&w=1200&auto=format&fit=crop'
},
{
name:'VIP 2',
price:15000,
daily:1440,
duration:30,
img:'https://images.unsplash.com/photo-1559526324-593bc073d938?q=80&w=1200&auto=format&fit=crop'
},
{
name:'VIP 3',
price:40000,
daily:19200,
duration:10,
img:'https://images.unsplash.com/photo-1518546305927-5a555bb7020d?q=80&w=1200&auto=format&fit=crop'
}
];

/* ================= REGISTER ================= */

async function register(){

try{

const phone = document.getElementById('phone').value.trim();
const pass = document.getElementById('pass').value.trim();
const ref = document.getElementById('ref').value.trim();

if(!phone || !pass){
alert('Veuillez remplir tous les champs');
return;
}

const existing = await databases.listDocuments(
DATABASE_ID,
USERS_COLLECTION,
[
Appwrite.Query.equal('phone', phone)
]
);

if(existing.documents.length > 0){
alert('Compte déjà existant');
return;
}

await databases.createDocument(
DATABASE_ID,
USERS_COLLECTION,
Appwrite.ID.unique(),
{
phone:phone,
password:pass,
balance:500,
code:'AI'+Math.random().toString(36).substring(2,8),
referrer:ref
}
);

alert('Compte créé avec succès');

}catch(error){
console.error(error);
alert('Erreur inscription');
}

}

/* ================= LOGIN ================= */

async function login(){

try{

const phone = document.getElementById('phone').value.trim();
const pass = document.getElementById('pass').value.trim();

const result = await databases.listDocuments(
DATABASE_ID,
USERS_COLLECTION,
[
Appwrite.Query.equal('phone', phone),
Appwrite.Query.equal('password', pass)
]
);

if(result.documents.length === 0){
alert('Identifiants incorrects');
return;
}

user = result.documents[0];

await loadUserData();

app.style.display = 'block';
auth.style.display = 'none';

document.getElementById('userPhone').innerText = user.phone;

renderAll();

}catch(error){
console.error(error);
alert('Erreur connexion');
}

}

/* ================= LOAD DATA ================= */

async function loadUserData(){

const ordersResult = await databases.listDocuments(
DATABASE_ID,
ORDERS_COLLECTION,
[
Appwrite.Query.equal('user_id', user.$id)
]
);

orders = ordersResult.documents;

const txResult = await databases.listDocuments(
DATABASE_ID,
TRANSACTIONS_COLLECTION,
[
Appwrite.Query.equal('user_id', user.$id)
]
);

transactions = txResult.documents;

}

/* ================= UPDATE USER ================= */

async function updateBalance(newBalance){

user.balance = newBalance;

await databases.updateDocument(
DATABASE_ID,
USERS_COLLECTION,
user.$id,
{
balance:newBalance
}
);

}

/* ================= HOME ================= */

function renderHome(){

home.innerHTML = `

<div class="balance-box">
<p>Solde disponible</p>
<h1>${user.balance.toLocaleString()} FCFA</h1>
</div>

`;

products.forEach((p,index)=>{

home.innerHTML += `
<div class="card">
<img src="${p.img}">
<div class="card-content">
<h3>${p.name}</h3>

<div class="grid-info">
<p>Prix : <b>${p.price}</b></p>
<p>Gain : <b>${p.daily}</b></p>
<p>Durée : <b>${p.duration} jours</b></p>
</div>

<button class="btn-primary" onclick="buyVIP(${index})">
Activer
</button>

</div>
</div>
`;

});

}

/* ================= BUY VIP ================= */

async function buyVIP(index){

try{

const p = products[index];

if(user.balance < p.price){
alert('Solde insuffisant');
return;
}

const newBalance = user.balance - p.price;

await updateBalance(newBalance);

await databases.createDocument(
DATABASE_ID,
ORDERS_COLLECTION,
Appwrite.ID.unique(),
{
user_id:user.$id,
product:p.name,
daily:p.daily,
purchaseTime:Date.now(),
lastClaim:0,
image:p.img
}
);

await databases.createDocument(
DATABASE_ID,
TRANSACTIONS_COLLECTION,
Appwrite.ID.unique(),
{
user_id:user.$id,
type:'achat',
amount:p.price,
date:new Date().toLocaleString()
}
);

await loadUserData();

renderAll();

alert('VIP activé');

}catch(error){
console.error(error);
alert('Erreur achat');
}

}

/* ================= ORDERS ================= */

function renderOrders(){

ordersPage.innerHTML = '<h2>Mes investissements</h2><br>';

if(orders.length === 0){
ordersPage.innerHTML += '<p>Aucun investissement</p>';
return;
}

orders.forEach(order=>{

ordersPage.innerHTML += `
<div class="card">
<img src="${order.image}">
<div class="card-content">
<h3>${order.product}</h3>
<p>Gain journalier : <b>${order.daily} FCFA</b></p>
<button class="btn-primary" onclick="claim('${order.$id}',${order.daily})">
Réclamer
</button>
</div>
</div>
`;

});

}

/* ================= CLAIM ================= */

async function claim(orderId,daily){

try{

const newBalance = user.balance + daily;

await updateBalance(newBalance);

await databases.createDocument(
DATABASE_ID,
TRANSACTIONS_COLLECTION,
Appwrite.ID.unique(),
{
user_id:user.$id,
type:'gain',
amount:daily,
date:new Date().toLocaleString()
}
);

await loadUserData();

renderAll();

alert('Gain reçu');

}catch(error){
console.error(error);
alert('Erreur gain');
}

}

/* ================= TEAM ================= */

function renderTeam(){

teamPage.innerHTML = `

<div class="card">
<div class="card-content">
<h3>Mon code</h3>
<p style="margin-top:10px;font-size:22px;font-weight:700;">
${user.code}
</p>
</div>
</div>

`;

}

/* ================= ME ================= */

function renderMe(){

mePage.innerHTML = `

<div class="menu-item" onclick="deposit()">
<span>💳 Dépôt</span>
<span>›</span>
</div>

<div class="menu-item" onclick="withdraw()">
<span>🏧 Retrait</span>
<span>›</span>
</div>

<div class="menu-item" onclick="showTransactions()">
<span>📜 Historique</span>
<span>›</span>
</div>

<div class="menu-item" onclick="logout()">
<span>⏻ Déconnexion</span>
<span>›</span>
</div>

`;

}

/* ================= TRANSACTIONS ================= */

function showTransactions(){

let html = '<div class="card"><div class="card-content">';

transactions.reverse().forEach(t=>{

html += `
<div style="padding:12px;border-bottom:1px solid #eee;">
<p><b>${t.type}</b></p>
<p>${t.amount} FCFA</p>
<p>${t.date}</p>
</div>
`;

});

html += '</div></div>';

mePage.innerHTML = html;

}

/* ================= DEPOSIT ================= */

function deposit(){
window.open('https://westpay.cloud','_blank');
}

/* ================= WITHDRAW ================= */

async function withdraw(){

const amount = parseInt(prompt('Montant retrait'));

if(isNaN(amount) || amount <= 0){
alert('Montant invalide');
return;
}

if(amount > user.balance){
alert('Solde insuffisant');
return;
}

try{

const newBalance = user.balance - amount;

await updateBalance(newBalance);

await databases.createDocument(
DATABASE_ID,
TRANSACTIONS_COLLECTION,
Appwrite.ID.unique(),
{
user_id:user.$id,
type:'retrait',
amount:amount,
date:new Date().toLocaleString()
}
);

await loadUserData();

renderAll();

alert('Retrait envoyé');

}catch(error){
console.error(error);
alert('Erreur retrait');
}

}

/* ================= NAVIGATION ================= */

function showPage(page){

const pages = document.querySelectorAll('.page');

pages.forEach(p=>p.classList.remove('active'));

document.getElementById(page).classList.add('active');

}

/* ================= LOGOUT ================= */

function logout(){

user = null;

app.style.display = 'none';
auth.style.display = 'flex';

}

/* ================= RENDER ================= */

function renderAll(){
renderHome();
renderOrders();
renderTeam();
renderMe();
}

</script>
</body>
</html>
