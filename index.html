<style>

/* ================= GLOBAL ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#001f4d,#0a2a5c,#d4a437);
    min-height:100vh;
    overflow-x:hidden;
    display:flex;
    justify-content:center;
    align-items:flex-start;
}

/* ================= AUTH ================= */

.auth-box{
    width:100%;
    max-width:420px;
    background:rgba(15,23,42,0.97);
    padding:25px;
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
    margin:20px;
}

.title{
    text-align:center;
    font-size:28px;
    color:#f5c542;
    font-weight:700;
    margin-bottom:25px;
}

.input-group{
    display:flex;
    flex-direction:column;
    margin-bottom:15px;
}

.input-group label{
    margin-bottom:6px;
    color:#cbd5e1;
    font-size:13px;
}

.input-group input,
.input-group select{
    padding:14px;
    border:none;
    border-radius:12px;
    background:#1e293b;
    color:#fff;
    font-size:14px;
    outline:none;
}

.input-group input:focus,
.input-group select:focus{
    border:1px solid #f5c542;
    background:#111827;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-weight:700;
    margin-top:10px;
    transition:0.3s;
}

button:hover{
    transform:scale(1.02);
}

.btn-primary{
    background:linear-gradient(135deg,#d4a437,#f7d774);
    color:#000;
}

.btn-secondary{
    background:#0f172a;
    color:#fff;
}

.small{
    text-align:center;
    margin-top:15px;
    font-size:12px;
    color:#94a3b8;
}

/* ================= APP ================= */

#app{
    display:none;
    width:100%;
    max-width:500px;
    min-height:100vh;
    background:#f5f7fb;
    position:relative;
}

/* ================= HEADER ================= */

.header{
    background:#0f172a;
    color:#fff;
    padding:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    z-index:999;
}

.logo{
    color:#f5c542;
    font-size:22px;
    font-weight:700;
}

/* ================= PAGE ================= */

.page{
    display:none;
    padding:15px;
    padding-bottom:100px;
}

.page.active{
    display:block;
}

/* ================= HOME ================= */

.banner{
    width:100%;
    border-radius:18px;
    margin-bottom:15px;
}

.balance-box{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:#fff;
    padding:20px;
    border-radius:18px;
    margin-bottom:15px;
}

.balance-box p{
    font-size:13px;
    opacity:0.8;
}

.balance-box h1{
    margin-top:10px;
    font-size:30px;
}

.vip-status{
    margin-top:12px;
    background:#14b85a;
    padding:8px;
    border-radius:10px;
    text-align:center;
    font-size:13px;
    font-weight:600;
}

.revenue-box{
    background:#fff;
    border-radius:15px;
    padding:15px;
    margin-bottom:15px;
    display:flex;
    justify-content:space-between;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.action-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-bottom:20px;
}

.action-btn{
    background:#fff;
    padding:15px;
    border-radius:14px;
    text-align:center;
    font-size:13px;
    cursor:pointer;
    box-shadow:0 5px 10px rgba(0,0,0,0.05);
}

/* ================= PRODUCT CARD ================= */

.card{
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:18px;
}

.card-content h3{
    margin-bottom:10px;
    font-size:22px;
}

.grid-info{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    font-size:14px;
    color:#555;
    margin-bottom:15px;
}

/* ================= PROFILE ================= */

.profile-card{
    background:#fff;
    border-radius:20px;
    padding:25px;
    text-align:center;
    margin-bottom:15px;
}

.avatar{
    width:80px;
    height:80px;
    border-radius:50%;
    background:#f5c542;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:35px;
    margin:auto;
}

.menu{
    background:#fff;
    border-radius:18px;
    overflow:hidden;
}

.menu-item{
    display:flex;
    justify-content:space-between;
    padding:16px;
    border-bottom:1px solid #eee;
    cursor:pointer;
}

/* ================= NAVIGATION ================= */

.nav{
    position:fixed;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    max-width:500px;
    background:#fff;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    border-top:1px solid #ddd;
}

.nav button{
    background:none;
    color:#0f172a;
    font-size:22px;
}

/* ================= INSTALL BUTTON ================= */

#installBtn{
    position:fixed;
    bottom:90px;
    right:20px;
    width:auto;
    padding:12px 18px;
    border-radius:50px;
    background:#f5c542;
    color:#000;
    font-weight:700;
    display:none;
}

</style>

/* ================= SAVE ================= */

function save(){

localStorage.setItem(
"users",
JSON.stringify(users)
);

localStorage.setItem(
"orders",
JSON.stringify(orders)
);

localStorage.setItem(
"transactions",
JSON.stringify(transactions)
);

}

/* ================= REGISTER ================= */

function register(){

const phone =
document.getElementById("phone").value.trim();

const pass =
document.getElementById("pass").value.trim();

const ref =
document.getElementById("ref").value.trim();

if(!phone || !pass){

alert("Veuillez remplir tous les champs");
return;

}

if(users.find(u=>u.phone===phone)){

alert("Compte déjà existant");
return;

}

const newUser = {

id:Date.now(),

phone:phone,

password:pass,

balance:5000,

code:"AI"+Math.random().toString(36).substring(2,8),

referrer:ref

};

users.push(newUser);

save();

alert("Compte créé avec succès");

}

/* ================= LOGIN ================= */

function login(){

const phone =
document.getElementById("phone").value.trim();

const pass =
document.getElementById("pass").value.trim();

const foundUser =
users.find(
u=>u.phone===phone && u.password===pass
);

if(!foundUser){

alert("Identifiants incorrects");
return;

}

user = foundUser;

auth.style.display = "none";
app.style.display = "block";

document.getElementById("userId").innerText =
user.phone;

renderAll();

}

/* ================= LOGOUT ================= */

function logout(){

user = null;

auth.style.display = "block";
app.style.display = "none";

}

document

.forEach(p=>p.classList.remove("active"));

document
.getElementById(page)
.classList.add("active");

}

/* ================= BUY ================= */

function buy(index){

const p = products[index];

if(user.balance < p.price){

alert("Solde insuffisant");
return;

}

user.balance -= p.price;

orders.push({

id:Date.now(),

user_id:user.id,

product:p.name,

daily:p.daily,

lastClaim:0

});

transactions.push({

user_id:user.id,

type:"achat",

amount:p.price

});

/* ===== MLM ===== */

const u1 =
users.find(u=>u.code===user.referrer);

if(u1){

const g1 = p.price * 0.27;

u1.balance += g1;

transactions.push({
user_id:u1.id,
type:"niveau1",
amount:g1
});

const u2 =
users.find(u=>u.code===u1.referrer);

if(u2){

const g2 = p.price * 0.02;

u2.balance += g2;

transactions.push({
user_id:u2.id,
type:"niveau2",
amount:g2
});

const u3 =
users.find(u=>u.code===u2.referrer);

if(u3){

const g3 = p.price * 0.01;

u3.balance += g3;

transactions.push({
user_id:u3.id,
type:"niveau3",
amount:g3
});

}

}

}

save();

renderAll();

alert("VIP activé avec succès");

}

/* ================= CLAIM ================= */

function claim(id){

const order =
orders.find(o=>o.id===id);

if(!order) return;

if(Date.now() - order.lastClaim < 86400000){

alert("Déjà réclamé aujourd'hui");
return;

}

order.lastClaim = Date.now();

user.balance += order.daily;

transactions.push({

user_id:user.id,

type:"gain",

amount:order.daily

});

save();

renderAll();

alert("Gain réclamé");

}

/* ================= ADD MODAL ================= */

document.body.appendChild(modal);

/* ================= CLOSE ================= */

document
.querySelector('.close-withdraw')
.onclick = () => modal.remove();

/* ================= COUNTRY CODE ================= */

const countrySelect = document.getElementById('withdrawCountry');

countrySelect.addEventListener('change',()=>{

document.getElementById('countryCode').innerText =
countrySelect.value || '+226';

});

/* ================= CONFIRM ================= */

document
.getElementById('confirmWithdraw')
.addEventListener('click',()=>{

const method =
document.getElementById('withdrawMethod').value;

const country =
document.getElementById('withdrawCountry').value;

const phone =
document.getElementById('withdrawPhone').value.trim();

const amount =
Number(document.getElementById('withdrawAmount').value);

/* ================= VALIDATION ================= */

if(!method){
alert('Sélectionnez une méthode');
return;
}

if(!country){
alert('Sélectionnez un pays');
return;
}

if(!phone){
alert('Entrez le numéro bénéficiaire');
return;
}

if(!amount || amount <= 0){
alert('Montant invalide');
return;
}

if(amount > user.balance){
alert('Solde insuffisant');
return;
}

/* ================= UPDATE BALANCE ================= */

user.balance -= amount;

/* ================= TRANSACTION ================= */

transactions.push({

user_id:user.id,

type:'retrait',

method:method,

country:country,

phone:phone,

amount:amount,

status:'En attente',

date:new Date().toLocaleString()

});

/* ================= SAVE ================= */

save();

renderAll();

/* ================= SUCCESS ================= */

alert(
`Demande de retrait envoyée avec succès via ${method}`
);

modal.remove();

});

}
                                                                  

/* ================= RENDER ALL ================= */

function renderAll(){

renderHome();
renderOrders();
renderTeam();
renderMe();

}

/* ================= PWA ================= */

let deferredPrompt;

window.addEventListener(
"beforeinstallprompt",
(e)=>{

e.preventDefault();

deferredPrompt = e;

installBtn.style.display = "block";

}
);

installBtn.addEventListener(
"click",
async()=>{

if(!deferredPrompt) return;

deferredPrompt.prompt();

await deferredPrompt.userChoice;

installBtn.style.display = "none";

}
);

/* ================= REFERRAL ================= */

window.addEventListener(
"load",
()=>{

const url = new URL(window.location.href);

const ref =
url.searchParams.get("ref");

if(ref){

document.getElementById("ref").value =
ref;

}

}
);

</script>
