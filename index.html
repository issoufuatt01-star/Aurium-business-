<style>

/* ================= GLOBAL ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);

overflow-x:hidden;

}

::-webkit-scrollbar{
width:6px;
}

::-webkit-scrollbar-thumb{

}

/* ================= LOADER ================= */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020617;
display:flex;
justify-content:center;
align-items:center;
z-index:999999;
flex-direction:column;
gap:20px;
}

.loader-ring{
width:80px;
height:80px;
border-radius:50%;
border:6px solid rgba(255,255,255,0.08);
border-top:6px solid gold;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

/* ================= AUTH ================= */

.auth-container{
width:100%;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.auth-box{
width:100%;
max-width:430px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.08);
padding:35px 25px;
border-radius:30px;
box-shadow:0 20px 50px rgba(0,0,0,0.5);
animation:fadeUp 0.8s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}
}

.logo-circle{
width:90px;
height:90px;
border-radius:50%;

display:flex;
justify-content:center;

.title{
text-align:center;
font-size:30px;
font-weight:800;
margin-top:20px;
}

.subtitle{
text-align:center;
color:#cbd5e1;
margin-top:10px;
margin-bottom:30px;
font-size:14px;

.input-group{

}

.input-group label{

.input-group input:focus,

.phone-box{

overflow:hidden;

.phone-code{

}

.phone-box input{

.btn-primary,
.btn-secondary{
width:100%;
height:58px;
border:none;
border-radius:18px;
font-size:15px;
font-weight:700;
cursor:pointer;
transition:0.3s;
margin-top:12px;
}

.btn-primary{
background:linear-gradient(135deg,gold,orange);
color:black;
}

.btn-secondary{
background:rgba(255,255,255,0.08);

/* ================= APP ================= */

#app{

width:100%;
max-width:500px;
margin:auto;
min-height:100vh;
background:#f8fafc;
position:relative;

/* ================= HEADER ================= */

.header{

top:0;

padding:18px;
background:#0f172a;

justify-content:space-between;

/* ================= PAGE ================= */

.page{

.page.active{
display:block;
}

/* ================= HOME ================= */

.banner{
width:100%;
height:210px;
object-fit:cover;
border-radius:24px;
margin-bottom:18px;
}

.balance-box{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
padding:22px;
border-radius:24px;
margin-bottom:18px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.balance-box p{
opacity:0.8;
font-size:13px;
}

.balance-box h1{
margin-top:12px;
font-size:34px;
}

.vip-status{
margin-top:15px;
background:#16a34a;
padding:10px;
border-radius:12px;
text-align:center;
font-size:13px;
font-weight:600;
}

.revenue-box{
background:white;
padding:18px;
border-radius:20px;
display:flex;
justify-content:space-between;
margin-bottom:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);

.action-grid{
display:grid;
grid-template-columns:repeat(4,1fr);

.action-btn{
background:white;
padding:15px 8px;
border-radius:18px;
text-align:center;
font-size:13px;
font-weight:600;
box-shadow:0 10px 25px rgba(0,0,0,0.05);

/* ================= CARDS ================= */

.card{
background:white;
border-radius:24px;
overflow:hidden;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.06);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-content{
padding:20px;
}

.card-content h3{
font-size:24px;
margin-bottom:12px;
}

.grid-info{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:18px;
font-size:14px;
color:#475569;
}

/* ================= PROFILE ================= */

.profile-card{

border-radius:24px;
padding:25px;
text-align:center;

.avatar{

height:90px;
border-radius:50%;
background:linear-gradient(135deg,gold,orange);

justify-content:center;
align-items:center;
font-size:40px;
margin:auto;
}

.menu{
background:white;
border-radius:22px;
overflow:hidden;
}

.menu-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
border-bottom:1px solid #e2e8f0;
font-weight:500;
cursor:pointer;
}

/* ================= NAV ================= */

.nav{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:500px;
display:grid;
grid-template-columns:repeat(4,1fr);
background:white;
border-top:1px solid #e2e8f0;
padding:10px 0;
}

.nav button{
background:none;
border:none;
font-size:22px;

}

/* ================= INSTALL ================= */

#installBtn{

color:black;
padding:14px 18px;

font-weight:700;

}

const installBtn = document.getElementById('installBtn');

let users = JSON.parse(localStorage.getItem('users')) || [];
let orders = JSON.parse(localStorage.getItem('orders')) || [];
let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

let user = null;

/* ================= PRODUITS PREMIUM ================= */

const products = [

}

];

/* ================= SAVE ================= */

function save(){
localStorage.setItem('users',JSON.stringify(users));
localStorage.setItem('orders',JSON.stringify(orders));
localStorage.setItem('transactions',JSON.stringify(transactions));
}

/* ================= PHONE ================= */

function updatePhoneCode(){

const country = document.getElementById('country').value;
const phoneInput = document.getElementById('phone');

document.getElementById('phoneCode').innerText = country;

if(country === '+226'){
phoneInput.placeholder = '70 00 00 00';
}

else if(country === '+225'){
phoneInput.placeholder = '07 00 00 00 00';
}

else if(country === '+223'){
phoneInput.placeholder = '70 00 00 00';
}

else if(country === '+221'){
phoneInput.placeholder = '77 000 00 00';
}

else if(country === '+237'){
phoneInput.placeholder = '6 70 00 00 00';
}

else{
phoneInput.placeholder = 'Numéro';
}

}

updatePhoneCode();

/* ================= REGISTER ================= */

async function register(){

const country = document.getElementById('country').value;
const phone = document.getElementById('phone').value.trim();
const email = document.getElementById('email').value.trim();
const pass = document.getElementById('pass').value.trim();
const ref = document.getElementById('ref').value.trim();

if(!phone || !email || !pass){
alert('Veuillez remplir tous les champs');
return;
}

try{

const fullPhone = country + phone;

await account.create(
ID.unique(),
email,
pass,
fullPhone
);

const newUser = {
id:Date.now(),
phone:fullPhone,
email:email,
password:pass,
balance:5000,
code:'AI'+Math.random().toString(36).substring(2,8),
referrer:ref
};

users.push(newUser);

save();

alert('Compte créé avec succès');

}catch(error){
alert(error.message);
}

}

/* ================= LOGIN ================= */

async function login(){

const email = document.getElementById('email').value.trim();
const pass = document.getElementById('pass').value.trim();

if(!email || !pass){
alert('Veuillez remplir les champs');
return;
}

try{

await account.createEmailPasswordSession(email,pass);

const foundUser = users.find(
u => u.email === email && u.password === pass
);

if(!foundUser){
alert('Compte introuvable');
return;
}

user = foundUser;

authContainer.style.display = 'none';
app.style.display = 'block';

document.getElementById('userId').innerText = user.phone;

renderAll();

}catch(error){
alert('Connexion échouée');
}

}

/* ================= LOGOUT ================= */

async function logout(){

try{

await account.deleteSession('current');

user = null;

authContainer.style.display = 'flex';
app.style.display = 'none';

}catch(error){
console.log(error);
}

}

/* ================= SHOW PAGE ================= */

function showPage(page){

document.querySelectorAll('.page')
.forEach(p=>p.classList.remove('active'));

document.getElementById(page)
.classList.add('active');

}

/* ================= HOME ================= */

function renderHome(){

let gains = transactions
.filter(t=>t.user_id===user.id && t.type==='gain')
.reduce((sum,t)=>sum+t.amount,0);

home.innerHTML = `

<img class="banner" src="https://images.unsplash.com/photo-1526304640581-d334cdbbf45e?q=80&w=1200&auto=format&fit=crop">

<div class="balance-box">
<p>Solde disponible</p>
<h1>${user.balance.toLocaleString()} FCFA</h1>
<div class="vip-status">Compte VIP Premium Actif</div>
</div>

<div class="revenue-box">
<span>Revenus cumulés</span>
<b>${gains.toLocaleString()} FCFA</b>
</div>

<div class="action-grid">
<div class="action-btn" onclick="deposit()">💳<br>Dépôt</div>
<div class="action-btn" onclick="withdraw()">🏧<br>Retrait</div>
<div class="action-btn" onclick="showPage('orders')">🚀<br>VIP</div>
<div class="action-btn" onclick="showPage('team')">👥<br>Équipe</div>
</div>

`;

products.forEach((p,index)=>{

home.innerHTML += `

<div class="card">
<img src="${p.img}">
<div class="card-content">
<h3>${p.name}</h3>

<div class="grid-info">
<p>Prix : <b>${p.price} FCFA</b></p>
<p>Durée : <b>${p.duration} jours</b></p>
<p>Total : <b>${p.total} FCFA</b></p>
<p>Jour : <b>${p.daily} FCFA</b></p>
</div>

<button class="btn-primary" onclick="buy(${index})">
Activer l'investissement
</button>

</div>
</div>

`;

});

}

/* ================= BUY ================= */

function buy(index){

const p = products[index];

if(user.balance < p.price){
alert('Solde insuffisant');
return;
}

user.balance -= p.price;

orders.push({
id:Date.now(),
user_id:user.id,
product:p.name,
daily:p.daily,
lastClaim:0
});

transactions.push({
user_id:user.id,
type:'achat',
amount:p.price
});

save();
renderAll();

alert('VIP activé avec succès');

}

/* ================= ORDERS ================= */

function renderOrders(){

const myOrders = orders.filter(o=>o.user_id===user.id);

ordersPage.innerHTML = '<h2 style="margin-bottom:20px;">Mes investissements</h2>';

if(myOrders.length===0){
ordersPage.innerHTML += '<p>Aucun investissement actif</p>';
return;
}

myOrders.forEach(order=>{

ordersPage.innerHTML += `

<div class="card">
<div class="card-content">
<h3>${order.product}</h3>
<p style="margin-bottom:20px;">
Gain journalier : <b>${order.daily} FCFA</b>
</p>

<button class="btn-primary" onclick="claim(${order.id})">
Réclamer le gain
</button>

</div>
</div>

`;

});

}

/* ================= CLAIM ================= */

function claim(id){

const order = orders.find(o=>o.id===id);

if(!order) return;

if(Date.now() - order.lastClaim < 86400000){
alert('Déjà réclamé aujourd\'hui');
return;
}

order.lastClaim = Date.now();

user.balance += order.daily;

transactions.push({
user_id:user.id,
type:'gain',
amount:order.daily
});

save();
renderAll();

alert('Gain réclamé');

}

const link = window.location.origin + window.location.pathname + '?ref=' + user.code;

teamPage.innerHTML = `

<div class="card-content">
<h3>Mon lien d'invitation</h3>

<p style="margin:15px 0;word-break:break-all;">
${link}
</p>

<button class="btn-primary" onclick="copyLink('${link}')">
Copier mon lien
</button>

<br><br>

<p>Équipe directe : ${l1.length}</p>

</div>
</div>

`;

}

/* ================= COPY ================= */

function copyLink(link){
navigator.clipboard.writeText(link);

}

mePage.innerHTML = `

function withdraw(){

/* ================= MODAL HTML ================= */

const modal = document.createElement('div');

modal.className = 'withdraw-modal';

modal.innerHTML = `

<div class="withdraw-box">

    <div class="withdraw-header">
        <h2>Retrait de fonds</h2>
        <span class="close-withdraw">&times;</span>
    </div>

    <div class="withdraw-body">

        <!-- MÉTHODE -->
        <div class="form-group">
            <label>Méthode de paiement</label>

            <select id="withdrawMethod">
                <option value="">Sélectionner</option>
                <option value="Wave">Wave</option>
                <option value="Orange Money">Orange Money</option>
                <option value="Moov Money">Moov Money</option>
                <option value="MTN Mobile Money">MTN Mobile Money</option>
                <option value="Telecel Money">Telecel Money</option>
            </select>
        </div>

        <!-- PAYS -->
        <div class="form-group">
            <label>Pays</label>

            <select id="withdrawCountry">
                <option value="">Sélectionner le pays</option>

                <option value="+226">🇧🇫 Burkina Faso (+226)</option>
                <option value="+225">🇨🇮 Côte d'Ivoire (+225)</option>
                <option value="+221">🇸🇳 Sénégal (+221)</option>
                <option value="+229">🇧🇯 Bénin (+229)</option>
                <option value="+223">🇲🇱 Mali (+223)</option>
                <option value="+228">🇹🇬 Togo (+228)</option>
                <option value="+227">🇳🇪 Niger (+227)</option>
                <option value="+237">🇨🇲 Cameroun (+237)</option>
            </select>
        </div>

        <!-- NUMÉRO -->
        <div class="form-group">
            <label>Numéro du bénéficiaire</label>

            <div class="phone-box">
                <span id="countryCode">+226</span>

                <input 
                    type="tel"
                    id="withdrawPhone"
                    placeholder="XX XX XX XX"
                >
            </div>
        </div>

        <!-- MONTANT -->
        <div class="form-group">
            <label>Montant du retrait</label>

            <input 
                type="number"
                id="withdrawAmount"
                placeholder="Entrer le montant"
            >
        </div>

        <!-- SOLDE -->
        <div class="balance-info">
            Solde disponible :
            <strong>${user.balance.toLocaleString()} FCFA</strong>
        </div>

        <!-- BTN -->
        <button class="withdraw-btn" id="confirmWithdraw">
            Confirmer le retrait
        </button>

    </div>

</div>

`;

/* ================= ADD MODAL ================= */

document.body.appendChild(modal);

/* ================= CLOSE ================= */

document
.querySelector('.close-withdraw')
.onclick = () => modal.remove();

/* ================= COUNTRY CODE ================= */

const countrySelect = document.getElementById('withdrawCountry');

countrySelect.addEventListener('change',()=>{

document.getElementById('countryCode').innerText =
countrySelect.value || '+226';

});

/* ================= CONFIRM ================= */

document
.getElementById('confirmWithdraw')
.addEventListener('click',()=>{

const method =
document.getElementById('withdrawMethod').value;

const country =
document.getElementById('withdrawCountry').value;

const phone =
document.getElementById('withdrawPhone').value.trim();

const amount =
Number(document.getElementById('withdrawAmount').value);

/* ================= VALIDATION ================= */

if(!method){
alert('Sélectionnez une méthode');
return;
}

if(!country){
alert('Sélectionnez un pays');
return;
}

if(!phone){
alert('Entrez le numéro bénéficiaire');
return;
}

if(!amount || amount <= 0){
alert('Montant invalide');
return;
}

if(amount > user.balance){
alert('Solde insuffisant');
return;
}

/* ================= UPDATE BALANCE ================= */

user.balance -= amount;

/* ================= TRANSACTION ================= */

transactions.push({

user_id:user.id,

type:'retrait',

method:method,

country:country,

phone:phone,

amount:amount,

status:'En attente',

date:new Date().toLocaleString()

});

/* ================= SAVE ================= */

save();

renderAll();

/* ================= SUCCESS ================= */

alert(
`Demande de retrait envoyée avec succès via ${method}`
);

modal.remove();

});

}
